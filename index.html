<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Agência de Eventos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Tela de boas-vindas -->
  <div id="welcome">
    <h2>Bem-vindo à nossa Agência!</h2>
    <p>Por favor, digite seu nome para continuar:</p>
    <input type="text" id="username" placeholder="Seu nome" />
    <button onclick="enterSite()">Entrar</button>
  </div>

  <!-- Conteúdo principal -->
  <div id="main-content">
    <header>
      <h1>Agência de Casamentos & Eventos</h1>
      <p>Planeje o evento dos seus sonhos, <span id="user-name-display"></span>!</p>
    </header>

    <section>
      <h2>Locais disponíveis</h2>
      <div class="cards-container">
        <div class="card">
          <h3>Quinta dos Sonhos</h3>
          <p>Preço: 2000€</p>
          <button>Ver Pacotes</button>
        </div>

        <div class="card">
          <h3>Salão Elegante</h3>
          <p>Preço: 1500€</p>
          <button>Ver Pacotes</button>
        </div>

        <div class="card">
          <h3>Espaço Jardim Encantado</h3>
          <p>Preço: 1800€</p>
          <button>Ver Pacotes</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    function enterSite() {
      const input = document.getElementById('username');
      const name = input.value.trim();
      if(name.length === 0) {
        alert('Por favor, digite o seu nome para continuar.');
        return;
      }
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('user-name-display').textContent = name;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Agência de Eventos</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #welcome, #main-content {
      padding: 20px;
      text-align: center;
    }
    #main-content {
      display: none;
    }
    input[type="text"] {
      padding: 8px;
      width: 200px;
      font-size: 16px;
    }
    button {
      padding: 8px 15px;
      font-size: 16px;
      background-color: #ff7a7a;
      color: white;
      border: none;
      cursor: pointer;
      margin-left: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div id="welcome">
    <h2>Olá! Qual é o seu nome?</h2>
    <input type="text" id="username" placeholder="Escreva seu nome aqui" />
    <button onclick="enterSite()">Entrar</button>
  </div>

  <div id="main-content">
    <header>
      <h1>Agência de Casamentos & Eventos</h1>
      <p>Organiza o teu evento de forma simples, <span id="user-name-display"></span>!</p>
    </header>

    <section>
      <h2>Locais disponíveis</h2>

      <div class="card">
        <h3>Quinta dos Sonhos</h3>
        <p>Preço: 2000€</p>
      </div>

      <div class="card">
        <h3>Salão Elegante</h3>
        <p>Preço: 1500€</p>
      </div>
    </section>
  </div>

  <script>
    function enterSite() {
      const input = document.getElementById('username');
      const name = input.value.trim();
      if(name.length === 0) {
        alert('Por favor, digite o seu nome para continuar.');
        return;
      }
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('user-name-display').textContent = name;
    }
  </script>

</body>
</html>
